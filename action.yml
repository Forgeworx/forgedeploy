name: 'ForgeDeploy'
description: 'Deploy and install a Forge app using Forge CLI in a GitHub Actions workflow.'

inputs:
  email:
    description: 'Atlassian account email (unused, for logging or later use)'
    required: true
  apiToken:
    description: 'Atlassian API token (used for non-interactive login)'
    required: true
  environment:
    description: 'Forge environment to deploy to (e.g. development, staging, production)'
    required: true
  siteUrl:
    description: 'Atlassian site URL (e.g. yourcompany.atlassian.net)'
    required: true
  product:
    description: 'Atlassian product to deploy to (e.g. jira, confluence)'
    required: true

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Forge CLI
      run: npm install -g @forge/cli
      shell: bash

    - name: Set usage-analytics flag to false
      run: forge settings set usage-analytics false
      shell: bash

    - name: Authenticate with Forge
      run: forge login --non-interactive --api-token
      env:
        FORGE_API_TOKEN: ${{ inputs.apiToken }}
      shell: bash

    - name: Deploy Forge app
      run: forge deploy --environment ${{ inputs.environment }} --non-interactive
      shell: bash

    - name: Install Forge app
      run: forge install \
        --product ${{ inputs.product }} \
        --site ${{ inputs.siteUrl }} \
        --environment ${{ inputs.environment }} \
        --non-interactive
      shell: bash
